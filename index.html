<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Majan Technology — Revenue Command</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surface:#0d1018;--card:#111520;--card2:#161b2a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --gold:#C8A84B;--gold-dim:rgba(200,168,75,0.12);--gold-border:rgba(200,168,75,0.28);
  --text:#E6E8F0;--muted:rgba(230,232,240,0.5);--dim:rgba(230,232,240,0.25);
  --green:#3DD68C;--red:#F05252;--blue:#4B9CF5;--purple:#8B5CF6;
  --orange:#F59E0B;--teal:#14B8A6;--pink:#EC4899;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* LAYOUT */
#app{display:flex;min-height:100vh}
#sidebar{width:230px;background:rgba(255,255,255,0.02);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
#main{flex:1;margin-left:230px;padding:24px 28px;overflow-y:auto;min-height:100vh}

/* SIDEBAR */
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-user{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-nav{flex:1;padding:8px 0}
.sb-section{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.14em;padding:12px 18px 4px;font-family:'DM Mono',monospace}
.nav-btn{width:100%;padding:9px 18px;display:flex;align-items:center;gap:9px;background:transparent;border:none;border-left:3px solid transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:400;transition:all .15s;text-align:left}
.nav-btn:hover{background:rgba(255,255,255,0.03);color:var(--text)}
.nav-btn.active{background:rgba(200,168,75,0.1);border-left-color:var(--gold);color:var(--gold);font-weight:600}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;border-radius:20px;padding:1px 6px;font-size:9px;font-family:'DM Mono',monospace}
.sb-footer{padding:10px 18px;border-top:1px solid var(--border);flex-shrink:0}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-flush{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:16px}
.g31{display:grid;grid-template-columns:3fr 1fr;gap:12px;margin-bottom:16px}

/* STAT CARD */
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border .2s}
.kpi:hover{border-color:var(--border2)}
.kpi-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.15}
.kpi-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:700;font-family:'Playfair Display',serif;line-height:1}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:4px}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;margin-top:5px}

/* SECTION TITLE */
.stitle{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;font-family:'DM Mono',monospace;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}

/* FORMS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.f{margin-bottom:13px}
.f.full{grid-column:span 2}
.f label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.09em;display:block;margin-bottom:4px;font-family:'DM Mono',monospace}
.fi{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:9px;padding:9px 13px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border .2s}
.fi:focus{border-color:var(--gold-border)}
select.fi option{background:#1a1f2e}
textarea.fi{resize:vertical}

/* BUTTONS */
.btn{border:none;border-radius:9px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;font-size:13px;padding:9px 16px}
.btn-p{background:linear-gradient(135deg,var(--gold),#9a7520);color:#07090f}
.btn-p:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,168,75,.3)}
.btn-g{background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid var(--border)}
.btn-g:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.btn-d{background:rgba(240,82,82,0.1);color:var(--red);border:1px solid rgba(240,82,82,.25)}
.btn-s{font-size:11px;padding:5px 10px;border-radius:7px}
.btn-ms{background:#fff;color:#1a1a1a;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;cursor:pointer;border:none;transition:all .2s;width:100%;justify-content:center}
.btn-ms:hover{background:#f5f5f5;transform:translateY(-1px)}

/* MODAL */
.mo{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);padding:16px}
.mo-box{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:26px;width:min(700px,96vw);max-height:92vh;overflow-y:auto;position:relative}
.mo-box.wide{width:min(820px,96vw)}
.mo-box.narrow{width:min(460px,96vw)}
.mo-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mo-title{font-size:17px;font-weight:700;font-family:'Playfair Display',serif}
.mo-close{background:rgba(255,255,255,0.07);border:none;border-radius:7px;width:30px;height:30px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 11px;text-align:left;color:var(--dim);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500}
.tbl td{padding:8px 11px;border-bottom:1px solid rgba(255,255,255,0.035)}
.tbl tr:hover td{background:rgba(255,255,255,0.02)}
.tbl tr:last-child td{border-bottom:none}

/* BADGES */
.badge{font-size:10px;padding:3px 8px;border-radius:20px;white-space:nowrap;font-family:'DM Mono',monospace;font-weight:500}
.mbar{width:100%;background:rgba(255,255,255,0.06);border-radius:3px;height:4px}
.mbar-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace}

/* STARS */
.stars{display:flex;gap:2px;color:var(--gold)}

/* PAGE HEADER */
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
.ph-title{font-size:21px;font-weight:700;font-family:'Playfair Display',serif}
.ph-sub{font-size:12px;color:var(--dim);margin-top:3px}

/* FILTERS */
.fbar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.fbar input,.fbar select{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:7px;padding:7px 11px;color:var(--text);font-size:12px;outline:none}

/* PROGRESS RING */
.pring{position:relative;display:inline-flex;align-items:center;justify-content:center}

/* COMMAND CENTER SPECIFIC */
.cmd-metric{background:linear-gradient(135deg,rgba(200,168,75,0.08),rgba(200,168,75,0.03));border:1px solid var(--gold-border);border-radius:14px;padding:18px 20px}
.risk-item{background:rgba(240,82,82,0.06);border:1px solid rgba(240,82,82,0.2);border-radius:10px;padding:11px 14px;margin-bottom:7px}
.opp-item{background:rgba(61,214,140,0.06);border:1px solid rgba(61,214,140,0.2);border-radius:10px;padding:11px 14px;margin-bottom:7px}
.alert-item{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:10px 14px;margin-bottom:7px}

/* SCORE CIRCLE */
.score-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;font-family:'Playfair Display',serif;flex-shrink:0}

/* LOGIN */
#login-screen{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.lg{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.lgrid{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.012) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}

/* SYNC */
#sync-bar{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--blue),var(--gold));background-size:200%;animation:sa 1.5s linear infinite;z-index:9999;display:none}
@keyframes sa{0%{background-position:0%}100%{background-position:200%}}
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.ti{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:12px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.4);animation:tslide .3s ease;display:flex;align-items:center;gap:7px}
@keyframes tslide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* SIMULATION */
.sim-slider{width:100%;accent-color:var(--gold)}
.sim-result{background:rgba(200,168,75,0.08);border:1px solid var(--gold-border);border-radius:10px;padding:14px;margin-top:10px}

/* GAUGE */
.gauge-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
</style>
</head>
<body>
<div id="sync-bar"></div>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lg" style="top:5%;left:10%;width:500px;height:500px;background:rgba(200,168,75,0.05)"></div>
  <div class="lg" style="bottom:10%;right:5%;width:600px;height:600px;background:rgba(75,156,245,0.04)"></div>

      <div style="display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--gold),#9a7520);margin-bottom:14px;box-shadow:0 10px 40px rgba(200,168,75,.35)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#07090f" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>

      <div style="margin-top:18px;padding:12px;background:rgba(255,255,255,.03);border-radius:9px;border:1px solid var(--border)">

</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sb-logo">
      <div style="display:flex;align-items:center;gap:9px">
        <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#9a7520);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#07090f" stroke-width="2.2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>

    <div class="sb-user" id="sb-user"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG & AUTH
// ═══════════════════════════════════════════════════
const CLIENT_ID = "594c09a4-8fd7-44ea-8a98-7981618686db";
const TENANT_ID = "f4585028-100a-41cc-a6e0-875e56e20c39";
const SCOPES    = ["User.Read","Files.ReadWrite","Sites.ReadWrite.All"];
const FILE_NAME = "MajanERP_v2.json";
const OMR_RATE  = 0.385; // 1 USD = 0.385 OMR (fixed peg)

const ROLE_MAP = {
  "anm@majants.onmicrosoft.com":       "admin",
  "aryantale@majants.onmicrosoft.com": "admin",
};

const msalCfg = {
  auth:{ clientId:CLIENT_ID, authority:`https://login.microsoftonline.com/${TENANT_ID}`, redirectUri:window.location.href.split("?")[0] },
  cache:{ cacheLocation:"sessionStorage" }
};
const msalApp = new msal.PublicClientApplication(msalCfg);

let CU = null; // current user
let GT = null; // graph token
let FID= null; // file id
let D  = {     // app data
  meetings:[], customers:[], vendors:[], users:[],
  deals:[], targets:[], incentive_rules:[],
  industries:["Banking & Finance","Government","Energy & Utilities","Telecom","Healthcare","Oil & Gas","Defence","Construction","Logistics","Real Estate","Education","Aviation"],
  gsi_partners:["Omantel","Ooredoo Oman","Bank Muscat","PDO","OIA","OPAL"],
  version:3
};

// ═══════════════════════════════════════════════════
// STATIC LISTS
// ═══════════════════════════════════════════════════
const STAGES   = ["Prospecting","Discovery","Demo","Proposal","Negotiation","Closed Won","Closed Lost"];
const TYPES    = ["Intro Call","Discovery","Technical Demo","Commercial Review","Executive Briefing","QBR","Partner Co-sell","Follow-up","PoC Review","Contract Review"];
const OUTCOMES = ["Next Meeting Set","Proposal Requested","Demo Requested","Budget Confirmed","Decision Pending","PoC Approved","No Interest","Deal Progressed","Contract Sent"];
const PRIORITIES= ["High","Medium","Low"];
const DEF_VENDORS=["CrowdStrike","Palo Alto Networks","Fortinet","Cisco","Microsoft","CyberArk","Splunk","SentinelOne","Zscaler","Tenable","Vectra AI","Darktrace","Proofpoint","Qualys"];
const STAGE_C  = {"Prospecting":"#4B9CF5","Discovery":"#8B5CF6","Demo":"#C8A84B","Proposal":"#F59E0B","Negotiation":"#EC4899","Closed Won":"#3DD68C","Closed Lost":"rgba(255,255,255,0.18)"};
const ROLE_C   = {admin:"#C8A84B",manager:"#8B5CF6",rep:"#4B9CF5",presales:"#14B8A6"};
const CHART_C  = ["#C8A84B","#4B9CF5","#8B5CF6","#3DD68C","#F59E0B","#14B8A6","#EC4899","#F43F5E","#6366F1"];

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const uid   = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const today = ()=>new Date().toISOString().split("T")[0];
const ym    = (d)=>{ const x=new Date(d||today()); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}`; };
const fDate = s=>s?new Date(s).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"}):"—";
const fOMR  = n=>{ n=Number(n||0); if(n>=1e6)return`OMR ${(n/1e6).toFixed(2)}M`; if(n>=1e3)return`OMR ${(n/1e3).toFixed(1)}K`; return`OMR ${n.toFixed(2)}`; };
const fUSD  = n=>{ n=Number(n||0); if(n>=1e6)return`$${(n/1e6).toFixed(1)}M`; if(n>=1e3)return`$${(n/1e3).toFixed(0)}K`; return`$${n}`; };
const omrUsd= n=>Number(n||0)/OMR_RATE;
const usdOmr= n=>Number(n||0)*OMR_RATE;
const fDual = (n,primary="omr")=>primary==="omr"
  ? `${fOMR(n)}<div style="font-size:10px;color:var(--dim);font-family:'DM Mono',monospace;margin-top:1px">${fUSD(omrUsd(n))}</div>`
  : `${fUSD(n)}<div style="font-size:10px;color:var(--dim);font-family:'DM Mono',monospace;margin-top:1px">${fOMR(usdOmr(n))}</div>`;
const pct   = (a,b)=>b?Math.round((a/b)*100):0;
const isOD  = m=>m.nextDate&&m.nextDate<today()&&m.stage!=="Closed Won"&&m.stage!=="Closed Lost";
const gCust = ()=>D.customers||[];
const gVend = ()=>(D.vendors&&D.vendors.length)?D.vendors:DEF_VENDORS.map(v=>({id:v,name:v}));
const gInd  = ()=>D.industries||[];
const gReps = ()=>(D.users||[]).filter(u=>u.role==="rep"||u.role==="presales");
const myMtg = ()=>CU?.role==="rep"||CU?.role==="presales" ? D.meetings.filter(m=>m.repEmail===CU.email) : D.meetings;

// ═══════════════════════════════════════════════════
// TOAST / SYNC
// ═══════════════════════════════════════════════════
function toast(msg,type="success"){
  const c={success:"var(--green)",error:"var(--red)",info:"var(--blue)",warn:"var(--orange)"};
  const el=document.createElement("div"); el.className="ti";
  el.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${c[type]||c.success};flex-shrink:0"></div>${msg}`;

async function getToken(){
  const accs=msalApp.getAllAccounts(); if(!accs.length)return null;
  try{ const r=await msalApp.acquireTokenSilent({scopes:SCOPES,account:accs[0]}); return r.accessToken; }

}
async function initUser(acc){

// ═══════════════════════════════════════════════════
// GRAPH / STORAGE
// ═══════════════════════════════════════════════════
async function gGraph(url,method="GET",body=null){
  const t=GT||await getToken();
  const o={method,headers:{Authorization:`Bearer ${t}`,"Content-Type":"application/json"}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(url,o); if(!r.ok&&r.status!==204)throw new Error(`Graph ${r.status}`);
  if(r.status===204)return null; return r.json();
}
async function loadData(){
  showSync();
  try{
    const s=await gGraph(`https://graph.microsoft.com/v1.0/me/drive/root/children?$filter=name eq '${FILE_NAME}'`);
    if(s.value&&s.value.length){
      FID=s.value[0].id;
      const t=GT||await getToken();
      const r=await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${FID}/content`,{headers:{Authorization:`Bearer ${t}`}});
      const txt=await r.text();
      try{
        const parsed=JSON.parse(txt);
        D={...D,...parsed};
        if(!D.customers)D.customers=[];
        if(!D.vendors)D.vendors=[];
        if(!D.deals)D.deals=[];
        if(!D.targets)D.targets=[];
        if(!D.incentive_rules)D.incentive_rules=getDefaultRules();
        if(!D.industries||!D.industries.length)D.industries=["Banking & Finance","Government","Energy & Utilities","Telecom","Healthcare","Oil & Gas","Defence","Construction","Logistics","Real Estate","Education","Aviation"];
      }catch{D.incentive_rules=getDefaultRules();}
    }else{
      D.incentive_rules=getDefaultRules();
      await saveData();
    }
    setSyncSt(true);
  }catch(e){console.error(e);setSyncSt(false);toast("OneDrive offline — working locally","warn");}
  hideSync();
}
async function saveData(){
  showSync();
  try{
    const t=GT||await getToken();
    const r=await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${FILE_NAME}:/content`,{method:"PUT",headers:{Authorization:`Bearer ${t}`,"Content-Type":"application/json"},body:JSON.stringify(D,null,2)});
    const data=await r.json(); if(data.id)FID=data.id;
    setSyncSt(true);
  }catch(e){console.error(e);setSyncSt(false);toast("Save failed","error");}
  hideSync();
}
function getDefaultRules(){
  return [
    {id:"r1",name:"Base Commission",type:"revenue_pct",value:3,condition:"all",description:"3% on all closed deals"},
    {id:"r2",name:"High Margin Bonus",type:"margin_bonus",value:1.5,condition:"margin_gt_30",description:"+1.5% if margin > 30%"},
    {id:"r3",name:"Fast Close Bonus",type:"speed_bonus",value:1,condition:"close_lt_60days",description:"+1% if closed within 60 days"},
    {id:"r4",name:"Target Achievement",type:"target_multiplier",value:1.2,condition:"above_target",description:"1.2x multiplier when above quarterly target"},
    {id:"r5",name:"Strategic Deal",type:"strategic_bonus",value:2,condition:"strategic_flag",description:"+2% on flagged strategic deals"},
  ];
}

// REVENUE ENGINE
// ═══════════════════════════════════════════════════
function rRevenue(){
  const ms=myMtg();
  const closed=ms.filter(m=>m.stage==="Closed Won");
  const totalRev=closed.reduce((s,m)=>s+Number(m.value||0),0);

  // Monthly revenue trend
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setMonth(d.getMonth()-i);
    const ym2=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const mRev=closed.filter(m=>ym(m.date)===ym2).reduce((s,m)=>s+Number(m.value||0),0);
    months.push({label:d.toLocaleDateString("en-GB",{month:"short"}),rev:mRev,ym:ym2});
  }
  const maxRev=Math.max(...months.map(m=>m.rev),1);

  // Attribution breakdown
  const totalAttrS=closed.reduce((s,m)=>s+Number(m.attr_sales||60),0)/Math.max(closed.length,1);
  const totalAttrP=closed.reduce((s,m)=>s+Number(m.attr_presales||20),0)/Math.max(closed.length,1);
  const totalAttrV=closed.reduce((s,m)=>s+Number(m.attr_vendor||15),0)/Math.max(closed.length,1);
  const totalAttrG=closed.reduce((s,m)=>s+Number(m.attr_gsi||5),0)/Math.max(closed.length,1);

  // GSI performance
  const gsiPerf={};
  closed.filter(m=>m.gsi_partner).forEach(m=>{
    if(!gsiPerf[m.gsi_partner])gsiPerf[m.gsi_partner]={name:m.gsi_partner,deals:0,revenue:0};
    gsiPerf[m.gsi_partner].deals++;
    gsiPerf[m.gsi_partner].revenue+=Number(m.value||0);
  });

  document.getElementById("v-revenue").innerHTML=`
    <div class="ph"><div class="ph-title">Revenue Engine</div><div class="ph-sub">Attribution, trends, and GSI performance</div></div>
    <div class="g4" style="margin-bottom:14px">
      ${kpi("Total Revenue",fOMR(totalRev),`${fUSD(omrUsd(totalRev))}`,"var(--green)",iRev())}
      ${kpi("Closed Deals",closed.length,`Win rate ${ms.length?pct(closed.length,ms.length):0}%`,"var(--gold)",iTroph())}
      ${kpi("Avg Deal Size",fOMR(closed.length?totalRev/closed.length:0),"Per closed deal","var(--blue)",iFlag())}
      ${kpi("GSI Revenue",fOMR(Object.values(gsiPerf).reduce((s,g)=>s+g.revenue,0)),`${Object.keys(gsiPerf).length} active partners`,"var(--purple)",iUsers())}
    </div>
    <div class="g21" style="margin-bottom:14px">
      <div class="card">
        <div class="stitle">Monthly Revenue Trend (6 months)</div>
        <div style="display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:8px">
          ${months.map(m=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="font-size:9px;color:var(--dim);font-family:'DM Mono',monospace">${fOMR(m.rev).split(" ")[1]||"0"}</div>
            <div style="width:100%;height:${m.rev?(m.rev/maxRev)*60:0}px;background:linear-gradient(180deg,var(--gold),#9a7520);border-radius:4px 4px 0 0;min-height:${m.rev?3:0}px;transition:height .5s"></div>
            <div style="font-size:10px;color:var(--dim)">${m.label}</div>
          </div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="stitle">Revenue Attribution</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${[["Sales",totalAttrS,"var(--gold)"],["Presales",totalAttrP,"var(--blue)"],["Vendor",totalAttrV,"var(--purple)"],["GSI",totalAttrG,"var(--green)"]].map(([l,v,c])=>`
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:3px">
                <span style="font-size:12px;color:var(--muted)">${l}</span>
                <span style="font-size:12px;color:${c};font-weight:600;font-family:'DM Mono',monospace">${v.toFixed(0)}%</span>
              </div>
              <div class="mbar"><div class="mbar-fill" style="width:${v}%;background:${c}"></div></div>
            </div>`).join("")}
        </div>
        <div style="margin-top:14px;padding:10px;background:rgba(255,255,255,.03);border-radius:8px;font-size:11px;color:var(--dim)">
          Attribution set per meeting in the meeting form. Default: Sales 60% · Presales 20% · Vendor 15% · GSI 5%
        </div>
      </div>
    </div>
    <div class="g2">
      <div class="card">
        ${barChart(gVend().map(v=>({k:v.name||v,v:closed.filter(m=>m.vendor===(v.name||v)).reduce((s,m)=>s+Number(m.value||0),0)})).filter(d=>d.v>0).sort((a,b)=>b.v-a.v).slice(0,8),"Revenue by Vendor","var(--teal)",v=>fOMR(v))}
      </div>
      <div class="card">
        <div class="stitle">GSI Partner Performance</div>
        ${Object.values(gsiPerf).length===0
          ?`<div style="font-size:13px;color:var(--dim)">No GSI deals logged yet.<br><br><span style="font-size:11px">Set GSI Partner when logging meetings with GSI involvement.</span></div>`
          :Object.values(gsiPerf).sort((a,b)=>b.revenue-a.revenue).map((g,i)=>`<div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:12px;color:var(--muted)">${g.name}</span>
              <span style="font-size:12px;color:${CHART_C[i]};font-weight:600;font-family:'DM Mono',monospace">${fOMR(g.revenue)}</span>
            </div>
            <div class="mbar"><div class="mbar-fill" style="width:${Object.values(gsiPerf)[0].revenue?pct(g.revenue,Object.values(gsiPerf)[0].revenue):0}%;background:${CHART_C[i]}"></div></div>
            <div style="font-size:10px;color:var(--dim);margin-top:2px">${g.deals} deals closed</div>
          </div>`).join("")
        }
      </div>
    </div>
  `;
}

// MARGIN CONTROL
// ═══════════════════════════════════════════════════
function rMargin(){
  const ms=myMtg();
  const closed=ms.filter(m=>m.stage==="Closed Won"&&m.margin);
  const avgMargin=closed.length?(closed.reduce((s,m)=>s+Number(m.margin||0),0)/closed.length).toFixed(1):0;
  const highMargin=closed.filter(m=>Number(m.margin||0)>=30).length;
  const lowMargin=closed.filter(m=>Number(m.margin||0)<15).length;
  const totalRev=closed.reduce((s,m)=>s+Number(m.value||0),0);
  const marginVal=closed.reduce((s,m)=>s+Number(m.value||0)*Number(m.margin||0)/100,0);

  document.getElementById("v-margin").innerHTML=`
    <div class="ph"><div class="ph-title">Margin Control</div><div class="ph-sub">Track and protect your margins across all deals</div></div>
    <div class="g4" style="margin-bottom:14px">
      ${kpi("Average Margin",`${avgMargin}%`,`Target: 25%+`,"var(--green)",iMarg())}
      ${kpi("Margin Value",fOMR(marginVal),`${fUSD(omrUsd(marginVal))} gross profit`,"var(--gold)",iRev())}
      ${kpi("High Margin Deals",highMargin,`Margin ≥ 30% · ${closed.length?pct(highMargin,closed.length):0}% of closed`,"var(--blue)",iTroph())}
      ${kpi("Low Margin Deals",lowMargin,`Margin < 15% · Review needed`,"var(--red)",iAlert())}
    </div>
    <div class="g2" style="margin-bottom:14px">
      <div class="card">
        <div class="stitle">Margin Distribution</div>
        ${[["< 10%","var(--red)",ms.filter(m=>Number(m.margin||0)<10)],["10–19%","var(--orange)",ms.filter(m=>Number(m.margin||0)>=10&&Number(m.margin||0)<20)],["20–29%","var(--gold)",ms.filter(m=>Number(m.margin||0)>=20&&Number(m.margin||0)<30)],["30%+","var(--green)",ms.filter(m=>Number(m.margin||0)>=30)]].map(([l,c,deals])=>`
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:12px;color:${c};font-weight:600">${l}</span>
              <span style="font-size:12px;color:var(--text);font-family:'DM Mono',monospace">${deals.length} deals · ${fOMR(deals.reduce((s,m)=>s+Number(m.value||0),0))}</span>
            </div>
            <div class="mbar"><div class="mbar-fill" style="width:${ms.length?pct(deals.length,ms.length):0}%;background:${c}"></div></div>
          </div>`).join("")}
      </div>
      <div class="card">
        ${barChart(gVend().map(v=>{
          const vm=closed.filter(m=>m.vendor===(v.name||v)&&m.margin);
          return {k:v.name||v,v:vm.length?(vm.reduce((s,m)=>s+Number(m.margin||0),0)/vm.length):0};
        }).filter(d=>d.v>0).sort((a,b)=>b.v-a.v).slice(0,8),"Avg Margin by Vendor","var(--purple)",v=>`${v.toFixed(1)}%`)}
      </div>
    </div>
    <div class="card-flush">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <span style="font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em">Deal Margin Detail</span>
      </div>
      <table class="tbl">
        <thead><tr><th>Customer</th><th>Vendor</th><th>Stage</th><th>Value (OMR)</th><th>Margin %</th><th>Margin Value</th><th>Rep</th><th>Flag</th></tr></thead>
        <tbody>
          ${ms.filter(m=>m.margin).sort((a,b)=>Number(a.margin||0)-Number(b.margin||0)).slice(0,50).map(m=>{
            const mg=Number(m.margin||0); const mv=Number(m.value||0)*mg/100;
            const flag=mg<15?"🔴 Low":mg<25?"🟡 Mid":"🟢 Good";
            return `<tr>
              <td style="color:var(--text);font-weight:500">${m.account}</td>
              <td style="color:var(--gold);font-size:11px">${m.vendor||"—"}</td>
              <td>${sbadge(m.stage)}</td>
              <td style="font-family:'DM Mono',monospace;color:var(--green)">${fOMR(m.value)}</td>
              <td style="font-weight:700;color:${mg>=30?"var(--green)":mg>=15?"var(--orange)":"var(--red)"};font-family:'DM Mono',monospace">${mg}%</td>
              <td style="font-family:'DM Mono',monospace;color:var(--muted)">${fOMR(mv)}</td>
              <td style="color:var(--dim);font-size:11px">${(m.repName||"").split(" ")[0]}</td>
              <td style="font-size:12px">${flag}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;
}

              const cWon=cMtg.filter(m=>m.stage==="Closed Won").reduce((s,m)=>s+Number(m.value||0),0);
              const score=penetrationScore(c.name);
              const clv=cWon*2.5; // estimated CLV = 2.5x historical revenue
              const status=score>=70?"🟢 Strategic":score>=40?"🟡 Growing":"🔴 Early Stage";
              return `<tr>

                <td style="font-family:'DM Mono',monospace;color:var(--blue)">${fOMR(cPipe)}</td>
                <td style="font-family:'DM Mono',monospace;color:var(--green)">${fOMR(cWon)}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px">
                    <div class="mbar" style="width:80px"><div class="mbar-fill" style="width:${score}%;background:${score>=70?"var(--green)":score>=40?"var(--orange)":"var(--red)"}"></div></div>
                    <span style="font-size:11px;font-weight:600;color:${score>=70?"var(--green)":score>=40?"var(--orange)":"var(--red)"};font-family:'DM Mono',monospace">${score}%</span>
                  </div>
                </td>
                <td style="font-family:'DM Mono',monospace;color:var(--purple)">${fOMR(clv)}</td>
                <td style="font-size:11px">${status}</td>
                <td>
                  <div style="font-size:11px;color:var(--text)">${c.focalName||"—"}</div>
                  ${c.focalPhone?`<div style="font-size:10px;color:var(--blue)">${c.focalPhone}</div>`:""}
                </td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>`
    }
  `;
}

function penetrationScore(customerName){
  const ms=D.meetings.filter(m=>m.account===customerName);
  if(!ms.length)return 0;
  let score=0;
  score+=Math.min(ms.length*5,25); // meetings (up to 25pts)
  const vendors=new Set(ms.map(m=>m.vendor).filter(Boolean));
  score+=Math.min(vendors.size*8,24); // vendor diversity (up to 24pts)
  if(ms.some(m=>m.stage==="Closed Won"))score+=20; // has won deal
  if(ms.some(m=>m.type==="Executive Briefing"))score+=10; // exec access
  if(ms.some(m=>m.type==="QBR"))score+=10; // QBR = deep relationship
  const types=new Set(ms.map(m=>m.type).filter(Boolean));
  score+=Math.min(types.size*2,11); // meeting type diversity
  return Math.min(score,100);
}

function runSim(){
  const ms=myMtg();
  const closed=ms.filter(m=>m.stage==="Closed Won");

  const totalWon=closed.reduce((s,m)=>s+Number(m.value||0),0);
  const avgDeal=closed.length?totalWon/closed.length:50000;
  const wr=ms.length?closed.length/ms.length:0.3;
  const curMarginPct=closed.length?(closed.reduce((s,m)=>s+Number(m.margin||20),0)/closed.length)/100:0.2;

  // Headcount sim

  const newDeals=reps*mtgs*12*wr;
  const newRevenue=newDeals*avgDeal;

      <div><div style="font-size:10px;color:var(--dim)">Net gain</div><div style="font-size:14px;font-weight:700;color:${netGain>0?"var(--green)":"var(--red)"};font-family:'DM Mono',monospace">${fOMR(netGain)}</div></div>

  const newMarginVal=totalWon*(curMarginPct+marginInc/100);

  const wrInc=Number(document.getElementById("sim-winrate")?.value||10);
  document.getElementById("sim-winrate-val")&&(document.getElementById("sim-winrate-val").textContent=`+${wrInc}%`);

      <div><div style="font-size:10px;color:var(--dim)">Current win rate</div><div style="font-size:16px;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif">${(wr*100).toFixed(0)}%</div></div>
      <div><div style="font-size:10px;color:var(--dim)">New win rate</div><div style="font-size:16px;font-weight:700;color:var(--green);font-family:'Playfair Display',serif">${(newWr*100).toFixed(0)}%</div></div>
      <div><div style="font-size:10px;color:var(--dim)">Extra deals</div><div style="font-size:14px;font-weight:700;color:var(--blue);font-family:'DM Mono',monospace">+${Math.round(extraDeals)}</div></div>

    </div>`;

  // Vendor sim
  const vendor=document.getElementById("sim-vendor")?.value||"";
  const vMtgsInc=Number(document.getElementById("sim-vendor-mtgs")?.value||5);
  document.getElementById("sim-vendor-mtgs-val")&&(document.getElementById("sim-vendor-mtgs-val").textContent=`+${vMtgsInc}/month`);
  const vClosed=closed.filter(m=>m.vendor===vendor);
  const vAvgDeal=vClosed.length?vClosed.reduce((s,m)=>s+Number(m.value||0),0)/vClosed.length:avgDeal*1.2;
  const vNewDeals=vMtgsInc*12*wr;
  const vNewRev=vNewDeals*vAvgDeal;
  const vEl=document.getElementById("sim-vendor-result");
  if(vEl)vEl.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><div style="font-size:10px;color:var(--dim)">Avg deal (${vendor})</div><div style="font-size:14px;font-weight:700;color:var(--gold);font-family:'DM Mono',monospace">${fOMR(vAvgDeal)}</div></div>

      <div style="grid-column:span 2"><div style="font-size:10px;color:var(--dim)">Revenue impact (12 months)</div><div style="font-size:18px;font-weight:700;color:var(--green);font-family:'Playfair Display',serif">+${fOMR(vNewRev)}</div></div>
    </div>`;

  // Combined
  const combined=newRevenue+extraRev+marginGain;
  const combEl=document.getElementById("sim-combined");
  if(combEl)combEl.innerHTML=`
    ${[["Headcount",newRevenue,"var(--gold)"],["Win Rate",extraRev,"var(--blue)"],["Margin",marginGain,"var(--purple)"],["Total Impact",combined,"var(--green)"]].map(([l,v,c])=>`
      <div style="background:${c}10;border:1px solid ${c}30;border-radius:10px;padding:16px;text-align:center">
        <div style="font-size:10px;color:var(--dim);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">${l}</div>
        <div style="font-size:20px;font-weight:700;color:${c};font-family:'Playfair Display',serif">${fOMR(v)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:3px">${fUSD(omrUsd(v))}</div>
      </div>`).join("")}
  `;
}

async function saveMeeting(id){
  const g=eid=>document.getElementById(eid)?.value||"";
  let repEmail=CU.email, repName=CU.name;
  if(CU.role!=="rep"&&CU.role!=="presales"){
    const rv=g("mf-rep"); if(rv){const parts=rv.split("|");repEmail=parts[0];repName=parts[1]||repEmail;}
  }
  const data={
    id:id||uid(),repEmail,repName,
    account:g("mf-acct"),industry:g("mf-ind"),vendor:g("mf-vend"),country:"Oman",
    type:g("mf-type"),stage:g("mf-stage"),priority:g("mf-prio"),outcome:g("mf-out"),
    value:Number(g("mf-val")||0),margin:Number(g("mf-margin")||0),
    date:g("mf-date"),duration:Number(g("mf-dur")||60),attended:Number(g("mf-att")||1),score:Number(g("mf-score")||3),
    attr_sales:Number(g("mf-attr-s")||60),attr_presales:Number(g("mf-attr-p")||20),attr_vendor:Number(g("mf-attr-v")||15),attr_gsi:Number(g("mf-attr-g")||5),
    gsi_partner:g("mf-gsi"),deal_source:g("mf-src"),strategic_flag:g("mf-strat")==="true",
    notes:g("mf-notes"),nextAction:g("mf-na"),nextDate:g("mf-nd"),
    updatedAt:today(),createdAt:id?(D.meetings.find(m=>m.id===id)||{}).createdAt||today():today()
  };
  if(id){D.meetings=D.meetings.map(m=>m.id===id?data:m);}else{D.meetings.unshift(data);}
  closeModal(); await saveData(); toast(id?"Meeting updated":"Meeting logged ✓");
  buildSidebar();
  // refresh current view
  const active=VIEWS.find(v=>document.getElementById(`v-${v}`)?.style.display==="block");
  if(active)renderView(active);
}

async function delMeeting(id){
  if(!confirm("Delete this meeting?"))return;

  const active=VIEWS.find(v=>document.getElementById(`v-${v}`)?.style.display==="block");

function donut(data,title){
  if(!data.length)return`<div class="stitle">${title}</div><div style="font-size:13px;color:var(--dim)">No data</div>`;
  const total=data.reduce((a,b)=>a+b.v,0)||1;
  const cx=68,r=50;
  let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const pct2=d.v/total,a1=angle,a2=angle+pct2*2*Math.PI; angle=a2;
    const x1=cx+r*Math.cos(a1),y1=cx+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cx+r*Math.sin(a2);
    return `<path d="M${cx},${cx} L${x1},${y1} A${r},${r} 0 ${pct2>.5?1:0},1 ${x2},${y2} Z" fill="${CHART_C[i%CHART_C.length]}" opacity=".85"/>`;
  });
  return `<div class="stitle">${title}</div>
    <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
      <div style="position:relative;flex-shrink:0">
        <svg width="${cx*2}" height="${cx*2}" viewBox="0 0 ${cx*2} ${cx*2}">
          <circle cx="${cx}" cy="${cx}" r="${r}" fill="rgba(255,255,255,.04)"/>
          ${slices.join("")}
          <circle cx="${cx}" cy="${cx}" r="${r*.56}" fill="var(--card)"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:19px;font-weight:700;font-family:'Playfair Display',serif">${total}</div>
          <div style="font-size:9px;color:var(--dim)">Total</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:90px">
        ${data.slice(0,7).map((d,i)=>`<div style="display:flex;align-items:center;gap:6px"><div style="width:7px;height:7px;border-radius:2px;background:${CHART_C[i%CHART_C.length]};flex-shrink:0"></div><span style="font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.k}</span><span style="font-size:11px;color:var(--text);font-weight:600;font-family:'DM Mono',monospace">${d.v}</span></div>`).join("")}
      </div>
    </div>`;
}

function barChart(data,title,color="var(--gold)",valFmt=v=>v){
  if(!data.length)return`<div class="stitle">${title}</div><div style="font-size:13px;color:var(--dim)">No data yet</div>`;
  const max=Math.max(...data.map(d=>d.v),1);
  return `<div class="stitle">${title}</div>
    ${data.map(d=>`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">${d.k}</span>
        <span style="font-size:11px;color:${color};font-weight:600;font-family:'DM Mono',monospace;flex-shrink:0;margin-left:8px">${valFmt(d.v)}</span>
      </div>
      <div class="mbar"><div class="mbar-fill" style="width:${(d.v/max)*100}%;background:${color}"></div></div>
    </div>`).join("")}`;
}

function weekBars(meetings){
  const weeks=Array.from({length:12},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(11-i)*7);
    const s=d.toISOString().split("T")[0];
    const nd=new Date(d); nd.setDate(nd.getDate()+7);
    const e=nd.toISOString().split("T")[0];
    return {label:`W${i+1}`,count:meetings.filter(m=>m.date>=s&&m.date<e).length};
  });
  const max=Math.max(...weeks.map(w=>w.count),1);
  return `<div style="display:flex;align-items:flex-end;gap:2px;height:52px">
    ${weeks.map(w=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="${w.count} meetings">
      <div style="width:100%;height:${(w.count/max)*44}px;background:linear-gradient(180deg,var(--gold),#9a7520);border-radius:2px 2px 0 0;min-height:${w.count?2:0}px;transition:height .4s"></div>
      <div style="font-size:8px;color:var(--dim);font-family:'DM Mono',monospace">${w.label}</div>
    </div>`).join("")}
  </div>`;
}

async function adminDelMeeting(id){
  if(!confirm("Delete this meeting permanently?"))return;
  D.meetings=D.meetings.filter(m=>m.id!==id);
  await saveData(); toast("Meeting deleted"); rAdmin(); buildSidebar();
}
async function adminDelCust(id){
  if(!confirm("Delete this customer?"))return;
  D.customers=D.customers.filter(c=>c.id!==id);
  await saveData(); toast("Customer deleted"); rAdmin();
}
async function adminDelVend(id){
  if(!confirm("Delete this vendor?"))return;
  D.vendors=D.vendors.filter(v=>v.id!==id);
  await saveData(); toast("Vendor deleted"); rAdmin();
}

async function addGSI(){
  const v=document.getElementById("gsi-new")?.value?.trim();
  if(!v)return;
  if(!D.gsi_partners)D.gsi_partners=[];
  if(!D.gsi_partners.includes(v)){D.gsi_partners.push(v);await saveData();toast("GSI partner added");}
  rAdmin();
}
async function removeGSI(name){
  D.gsi_partners=(D.gsi_partners||[]).filter(g=>g!==name);
  await saveData(); toast("Removed"); rAdmin();
}

async function saveTargets(){
  D.users=D.users.map(u=>{
    const t=document.getElementById(`target-${u.id}`);
    const c=document.getElementById(`comm-${u.id}`);
    return {...u,target_monthly:t?Number(t.value):u.target_monthly,commission_rate:c?Number(c.value):u.commission_rate};
  });
  await saveData(); toast("Targets saved ✓","success");
}

async function delRule(id){
  if(!confirm("Delete this commission rule?"))return;
  D.incentive_rules=(D.incentive_rules||[]).filter(r=>r.id!==id);
  await saveData(); toast("Rule deleted"); rAdmin();
}

// DATA EXPORT / IMPORT
function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url;
  a.download=`MajanERP_backup_${today()}.json`; a.click();
  URL.revokeObjectURL(url);
  toast("Data exported ✓");
}

async function importData(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try{
      const imported=JSON.parse(e.target.result);
      if(!confirm(`Import ${imported.meetings?.length||0} meetings, ${imported.customers?.length||0} customers, ${imported.users?.length||0} users? This will MERGE with existing data.`))return;
      // Merge — add non-duplicate records
      if(imported.meetings)imported.meetings.forEach(m=>{if(!D.meetings.find(x=>x.id===m.id))D.meetings.push(m);});
      if(imported.customers)imported.customers.forEach(c=>{if(!D.customers.find(x=>x.id===c.id))D.customers.push(c);});
      if(imported.vendors)imported.vendors.forEach(v=>{if(!D.vendors.find(x=>x.id===v.id))D.vendors.push(v);});
      if(imported.users)imported.users.forEach(u=>{if(!D.users.find(x=>x.id===u.id))D.users.push(u);});
      await saveData(); toast(`Imported successfully ✓`); rAdmin();
    }catch(err){toast("Invalid file format","error");}
  };
  reader.readAsText(file);
}

async function clearAllMeetings(){
  if(!confirm("DELETE ALL MEETINGS? This cannot be undone."))return;
  if(!confirm("Are you absolutely sure? All meeting data will be lost."))return;
  D.meetings=[];

async function clearAllCustomers(){

async function resetToDefaults(){
  if(!confirm("Reset industries and GSI partners to defaults?"))return;
  D.industries=["Banking & Finance","Government","Energy & Utilities","Telecom","Healthcare","Oil & Gas","Defence","Construction","Logistics","Real Estate","Education","Aviation"];
  D.gsi_partners=["Omantel","Ooredoo Oman","Bank Muscat","PDO","OIA","OPAL"];
  D.incentive_rules=getDefaultRules();
  await saveData(); toast("Reset to defaults ✓"); rAdmin();
}

async function forceSync(){

  await saveData();
  toast("Sync complete ✓");
}

  if(accs.length>0){try{await initUser(accs[0]);}catch(e){console.error(e);}}
})();
</script>
