<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Majan Technology ERP</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#07090f;--surface:#0d1018;--card:#111520;--border:rgba(255,255,255,0.07);
    --gold:#C8A84B;--gold-dim:rgba(200,168,75,0.12);--gold-border:rgba(200,168,75,0.28);
    --text:#E6E8F0;--muted:rgba(230,232,240,0.45);--dim:rgba(230,232,240,0.22);
    --green:#3DD68C;--red:#F05252;--blue:#4B9CF5;--purple:#8B5CF6;--orange:#F59E0B;--teal:#14B8A6;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
  input,select,textarea{font-family:'DM Sans',sans-serif}

  /* LAYOUT */
  #app{display:flex;min-height:100vh}
  #sidebar{width:220px;background:rgba(255,255,255,0.025);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100}
  #main{flex:1;margin-left:220px;padding:28px;overflow-y:auto;min-height:100vh}

  /* SIDEBAR */
  .sb-logo{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
  .sb-logo-mark{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--gold),#9a7520);display:flex;align-items:center;justify-content:center;color:#07090f;font-size:16px;font-weight:700;font-family:'Playfair Display',serif}
  .sb-logo-text{font-size:15px;font-weight:700;font-family:'Playfair Display',serif;line-height:1;color:var(--text)}
  .sb-logo-sub{font-size:9px;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:.12em;margin-top:3px}
  .sb-user{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .sb-nav{flex:1;padding:10px 0}
  .nav-btn{width:100%;padding:11px 18px;display:flex;align-items:center;gap:10px;background:transparent;border:none;border-left:3px solid transparent;color:var(--muted);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:400;transition:all .2s;text-align:left}
  .nav-btn:hover{background:rgba(255,255,255,0.03);color:var(--text)}
  .nav-btn.active{background:rgba(200,168,75,0.1);border-left-color:var(--gold);color:var(--gold);font-weight:600}
  .nav-icon{width:18px;height:18px;flex-shrink:0}
  .sb-footer{padding:12px 18px;border-top:1px solid var(--border)}
  .badge-alert{margin-left:auto;background:rgba(240,82,82,0.2);color:var(--red);border-radius:20px;padding:1px 6px;font-size:10px;font-family:'DM Mono',monospace}

  /* CARDS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px}
  .card-flush{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  .grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:18px}

  /* STAT CARD */
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 22px;position:relative;overflow:hidden}
  .stat-glow{position:absolute;top:-24px;right:-24px;width:90px;height:90px;border-radius:50%}
  .stat-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace;margin-bottom:10px}
  .stat-value{font-size:28px;font-weight:700;font-family:'Playfair Display',serif;line-height:1}
  .stat-sub{font-size:12px;color:var(--dim);margin-top:5px}

  /* SECTION TITLE */
  .sec-title{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;font-family:'DM Mono',monospace;margin-bottom:16px}

  /* FORMS */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .field{margin-bottom:14px}
  .field.full{grid-column:span 2}
  .field label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.09em;display:block;margin-bottom:5px;font-family:'DM Mono',monospace}
  .field input,.field select,.field textarea{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border .2s;font-family:'DM Sans',sans-serif}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold-border)}
  .field textarea{resize:vertical}
  select option{background:#1a1f2e}

  /* BUTTONS */
  .btn{border:none;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;font-size:13px;padding:10px 18px}
  .btn-primary{background:linear-gradient(135deg,var(--gold),#9a7520);color:#07090f}
  .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
  .btn-ghost{background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{background:rgba(255,255,255,0.1);color:var(--text)}
  .btn-danger{background:rgba(240,82,82,0.12);color:var(--red);border:1px solid rgba(240,82,82,0.3)}
  .btn-sm{font-size:12px;padding:6px 12px;border-radius:8px}
  .btn-ms{background:#fff;color:#333;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;cursor:pointer;border:none;transition:all .2s;width:100%;justify-content:center}
  .btn-ms:hover{background:#f0f0f0;transform:translateY(-1px)}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);padding:16px}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:min(680px,96vw);max-height:92vh;overflow-y:auto;position:relative}
  .modal-wide{width:min(780px,96vw)}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
  .modal-title{font-size:18px;font-weight:700;font-family:'Playfair Display',serif}
  .modal-close{background:rgba(255,255,255,0.07);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}

  /* TABLE */
  .tbl{width:100%;border-collapse:collapse;font-size:12px}
  .tbl th{padding:10px 12px;text-align:left;color:var(--dim);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500}
  .tbl td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.04)}
  .tbl tr:hover td{background:rgba(255,255,255,0.025)}
  .tbl tr:last-child td{border-bottom:none}

  /* BADGES */
  .badge{font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap;font-family:'DM Mono',monospace;font-weight:500}
  .mini-bar-wrap{width:100%;background:rgba(255,255,255,0.06);border-radius:4px;height:5px}
  .mini-bar{height:100%;border-radius:4px;transition:width .5s ease}

  /* AVATAR */
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace}

  /* STARS */
  .stars{display:flex;gap:2px;color:var(--gold)}
  .star{width:12px;height:12px}

  /* LOGIN */
  #login-screen{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .login-glow-1{position:absolute;top:10%;left:15%;width:400px;height:400px;border-radius:50%;background:rgba(200,168,75,0.04);filter:blur(80px);pointer-events:none}
  .login-glow-2{position:absolute;bottom:15%;right:10%;width:500px;height:500px;border-radius:50%;background:rgba(75,156,245,0.04);filter:blur(100px);pointer-events:none}
  .login-grid{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.015) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
  .login-box{width:min(420px,92vw);position:relative;z-index:1}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.5)}

  /* CHARTS */
  .donut-wrap{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .donut-legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:100px}
  .donut-legend-item{display:flex;align-items:center;gap:7px}
  .donut-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

  /* OVERDUE */
  .overdue-item{background:rgba(240,82,82,0.06);border:1px solid rgba(240,82,82,0.2);border-radius:10px;padding:11px 14px;margin-bottom:8px;cursor:pointer}

  /* PRIORITY DOT */
  .pdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

  /* PAGE HEADER */
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
  .page-title{font-size:22px;font-weight:700;font-family:'Playfair Display',serif}
  .page-sub{font-size:13px;color:var(--dim);margin-top:3px}

  /* FILTERS */
  .filters-bar{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .filters-bar input,.filters-bar select{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;outline:none;font-family:'DM Sans',sans-serif}

  /* USER TABLE ROW */
  .status-pill{font-size:11px;padding:3px 9px;border-radius:20px}

  /* TOAST */
  #toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
  .toast-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideIn .3s ease;display:flex;align-items:center;gap:8px}
  @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

  /* SYNC indicator */
  #sync-bar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--blue),var(--gold));background-size:200%;animation:syncAnim 1.5s linear infinite;z-index:9999;display:none}
  @keyframes syncAnim{0%{background-position:0%}100%{background-position:200%}}

  /* Scrollbar */
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

  /* Responsive */
  @media(max-width:768px){
    #sidebar{transform:translateX(-100%)}
    #main{margin-left:0}
    .grid-4{grid-template-columns:1fr 1fr}
    .grid-3{grid-template-columns:1fr}
    .grid-2,.grid-2-1{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div id="sync-bar"></div>
<div id="toast"></div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-glow-1"></div>
  <div class="login-glow-2"></div>
  <div class="login-grid"></div>
  <div class="login-box">
    <div style="text-align:center;margin-bottom:32px">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--gold),#9a7520);margin-bottom:16px;box-shadow:0 8px 32px rgba(200,168,75,.3)">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#07090f" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div style="font-size:24px;font-weight:700;font-family:'Playfair Display',serif">Majan Technology ERP</div>
      <div style="font-size:11px;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:.12em;margin-top:6px">MEETING INTELLIGENCE PLATFORM</div>
    </div>
    <div class="login-card">
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">Welcome back</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px">Sign in with your Majan Technology Microsoft account</div>
      <button class="btn-ms" onclick="signIn()">
        <svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
        Sign in with Microsoft
      </button>
      <div id="login-error" style="display:none;margin-top:14px;background:rgba(240,82,82,.1);border:1px solid rgba(240,82,82,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red)"></div>
      <div style="margin-top:20px;padding:14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border)">
        <div style="font-size:10px;color:var(--dim);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Access restricted to</div>
        <div style="font-size:12px;color:var(--muted)">@MAJANTS.onmicrosoft.com accounts only</div>
        <div style="font-size:11px;color:var(--dim);margin-top:4px">Your role is assigned automatically based on your email</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-logo">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="sb-logo-mark">M</div>
        <div>
          <div class="sb-logo-text">MajanERP</div>
          <div class="sb-logo-sub">MEETING INTELLIGENCE</div>
        </div>
      </div>
    </div>
    <div class="sb-user" id="sb-user-info"></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-footer">
      <div style="font-size:11px;color:var(--dim);margin-bottom:8px;font-family:'DM Mono',monospace">DATA STORAGE</div>
      <div id="sync-status" style="font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;margin-bottom:12px">
        <div style="width:6px;height:6px;border-radius:50%;background:var(--green)"></div>
        Connected to OneDrive
      </div>
      <button class="btn btn-ghost btn-sm" onclick="signOut()" style="width:100%;justify-content:center;color:var(--red);border-color:rgba(240,82,82,.3)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main">
    <div id="view-dashboard"></div>
    <div id="view-meetings" style="display:none"></div>
    <div id="view-pipeline" style="display:none"></div>
    <div id="view-analytics" style="display:none"></div>
    <div id="view-users" style="display:none"></div>
  </div>
</div>

<!-- MODALS -->
<div id="modal-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const CLIENT_ID  = "594c09a4-8fd7-44ea-8a98-7981618686db";
const TENANT_ID  = "f4585028-100a-41cc-a6e0-875e56e20c39";
const AUTHORITY  = `https://login.microsoftonline.com/${TENANT_ID}`;
const SCOPES     = ["User.Read","Files.ReadWrite","Sites.ReadWrite.All"];
const FILE_NAME  = "MajanERP_Data.json";

const ROLE_MAP = {
  "anm@majants.onmicrosoft.com":        "admin",
  "aryantale@majants.onmicrosoft.com":  "admin",
};
const DEFAULT_ROLE = "rep";

// ═══════════════════════════════════════════════════════════════
// MSAL SETUP
// ═══════════════════════════════════════════════════════════════
const msalConfig = {
  auth: { clientId: CLIENT_ID, authority: AUTHORITY, redirectUri: window.location.href.split('?')[0] },
  cache: { cacheLocation: "sessionStorage" }
};
const msalInstance = new msal.PublicClientApplication(msalConfig);

let currentUser = null;
let graphToken  = null;
let fileId      = null;
let appData     = { meetings:[], users:[], version:1 };

// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const ACCOUNTS_LIST  = ["Emirates NBD","ADNOC","Etisalat","RTA","Dubai Health Authority","DEWA","stc Saudi","Mobily","Aramco","STC Kuwait","Zain KSA","MOI Qatar","QatarEnergy","Ooredoo","SABIC","ENOC","DIB","FAB","HSBC MENA","Omantel","Bank Muscat"];
const VENDORS_LIST   = ["CrowdStrike","Palo Alto Networks","Fortinet","Cisco","Microsoft","CyberArk","Splunk","SentinelOne","Zscaler","Tenable","Vectra AI","Darktrace","Proofpoint","Qualys"];
const STAGES_LIST    = ["Prospecting","Discovery","Demo","Proposal","Negotiation","Closed Won","Closed Lost"];
const TYPES_LIST     = ["Intro Call","Discovery","Technical Demo","Commercial Review","Executive Briefing","QBR","Partner Co-sell","Follow-up","PoC Review","Contract Review"];
const OUTCOMES_LIST  = ["Next Meeting Set","Proposal Requested","Demo Requested","Budget Confirmed","Decision Pending","PoC Approved","No Interest","Deal Progressed","Contract Sent"];
const COUNTRIES_LIST = ["UAE","KSA","Qatar","Kuwait","Bahrain","Oman"];
const INDUSTRIES_LIST= ["Banking & Finance","Government","Energy & Utilities","Telecom","Healthcare","Retail","Real Estate","Transport","Education","Defence"];
const PRIORITIES_LIST= ["High","Medium","Low"];

const STAGE_COLORS = {
  "Prospecting":"#4B9CF5","Discovery":"#8B5CF6","Demo":"#C8A84B",
  "Proposal":"#F59E0B","Negotiation":"#EC4899","Closed Won":"#3DD68C","Closed Lost":"rgba(255,255,255,0.2)"
};

const ROLE_COLORS = { admin:"#C8A84B", manager:"#8B5CF6", rep:"#4B9CF5" };

function today(){ return new Date().toISOString().split("T")[0]; }
function fmtDate(s){ if(!s)return"—"; return new Date(s).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"}); }
function fmtMoney(n){ n=Number(n||0); if(n>=1e6)return`$${(n/1e6).toFixed(1)}M`; if(n>=1e3)return`$${(n/1e3).toFixed(0)}K`; return`$${n}`; }
function isOverdue(m){ return m.nextDate && m.nextDate < today() && m.stage!=="Closed Won" && m.stage!=="Closed Lost"; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
function toast(msg, type="success"){
  const colors = { success:"var(--green)", error:"var(--red)", info:"var(--blue)" };
  const el = document.createElement("div");
  el.className = "toast-item";
  el.innerHTML = `<div style="width:8px;height:8px;border-radius:50%;background:${colors[type]};flex-shrink:0"></div>${msg}`;
  document.getElementById("toast").appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

// ═══════════════════════════════════════════════════════════════
// SYNC BAR
// ═══════════════════════════════════════════════════════════════
function showSync(){ document.getElementById("sync-bar").style.display="block"; }
function hideSync(){ document.getElementById("sync-bar").style.display="none"; }

// ═══════════════════════════════════════════════════════════════
// MICROSOFT AUTH
// ═══════════════════════════════════════════════════════════════
async function signIn(){
  try {
    const result = await msalInstance.loginPopup({ scopes: SCOPES });
    await initUser(result.account);
  } catch(e){
    const el = document.getElementById("login-error");
    el.style.display = "block";
    el.textContent = e.message || "Sign in failed. Ensure you use your @MAJANTS.onmicrosoft.com account.";
  }
}

async function signOut(){
  await msalInstance.logoutPopup();
  currentUser = null; graphToken = null; fileId = null;
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

async function getToken(){
  const accounts = msalInstance.getAllAccounts();
  if(!accounts.length) return null;
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  } catch {
    const r = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    return r.accessToken;
  }
}

async function initUser(account){
  graphToken = await getToken();
  const profile = await callGraph("https://graph.microsoft.com/v1.0/me");
  const email = (profile.mail || profile.userPrincipalName || "").toLowerCase();
  const role = ROLE_MAP[email] || DEFAULT_ROLE;

  currentUser = {
    id: account.homeAccountId,
    name: profile.displayName || account.name,
    email,
    role,
    initials: (profile.displayName||"U").split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase()
  };

  // Ensure user is in appData.users
  await loadData();
  const existing = appData.users.find(u=>u.email===email);
  if(!existing){
    appData.users.push({ id:uid(), name:currentUser.name, email, role, active:true, createdAt:today() });
    await saveData();
  }

  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  buildSidebar();
  renderView("dashboard");
}

// ═══════════════════════════════════════════════════════════════
// GRAPH API
// ═══════════════════════════════════════════════════════════════
async function callGraph(url, method="GET", body=null){
  const token = graphToken || await getToken();
  const opts = { method, headers:{ Authorization:`Bearer ${token}`, "Content-Type":"application/json" } };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if(!r.ok && r.status !== 204) throw new Error(`Graph error ${r.status}: ${await r.text()}`);
  if(r.status===204) return null;
  return r.json();
}

async function callGraphRaw(url, method="GET", body=null){
  const token = graphToken || await getToken();
  const opts = { method, headers:{ Authorization:`Bearer ${token}`, "Content-Type":"application/json" } };
  if(body) opts.body = JSON.stringify(body);
  return fetch(url, opts);
}

// ═══════════════════════════════════════════════════════════════
// DATA STORAGE (OneDrive)
// ═══════════════════════════════════════════════════════════════
async function loadData(){
  showSync();
  try {
    // Try to find existing file
    const search = await callGraph(`https://graph.microsoft.com/v1.0/me/drive/root/children?$filter=name eq '${FILE_NAME}'`);
    if(search.value && search.value.length > 0){
      fileId = search.value[0].id;
      const r = await callGraphRaw(`https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/content`);
      const text = await r.text();
      try { appData = JSON.parse(text); } catch { appData = { meetings:[], users:[], version:1 }; }
    } else {
      // Create new file
      appData = { meetings:[], users:[], version:1 };
      await saveData();
    }
    updateSyncStatus(true);
  } catch(e) {
    console.error("Load error:", e);
    updateSyncStatus(false);
    toast("Could not connect to OneDrive. Working offline.", "error");
  }
  hideSync();
}

async function saveData(){
  showSync();
  try {
    const content = JSON.stringify(appData, null, 2);
    const blob = new Blob([content], { type:"application/json" });
    const r = await callGraphRaw(
      `https://graph.microsoft.com/v1.0/me/drive/root:/${FILE_NAME}:/content`,
      "PUT", null
    );
    // Use fetch directly for binary upload
    const token = graphToken || await getToken();
    const resp = await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${FILE_NAME}:/content`, {
      method:"PUT",
      headers:{ Authorization:`Bearer ${token}`, "Content-Type":"application/json" },
      body: content
    });
    const data = await resp.json();
    if(data.id) fileId = data.id;
    updateSyncStatus(true);
  } catch(e){
    console.error("Save error:", e);
    updateSyncStatus(false);
    toast("Save failed. Check OneDrive connection.", "error");
  }
  hideSync();
}

function updateSyncStatus(ok){
  const el = document.getElementById("sync-status");
  if(!el) return;
  el.style.color = ok ? "var(--green)" : "var(--red)";
  el.innerHTML = `<div style="width:6px;height:6px;border-radius:50%;background:${ok?"var(--green)":"var(--red)"}"></div>${ok?"Synced to OneDrive":"Sync error"}`;
}

async function saveMeeting(id){
  const g = (eid) => { const el=document.getElementById(eid); return el?el.value:""; };

  let repEmail = currentUser.email;
  let repName  = currentUser.name;
  if(currentUser.role!=="rep"){
    const repVal = g("f-rep");
    if(repVal){ const parts=repVal.split("|"); repEmail=parts[0]; repName=parts[1]||repEmail; }
  }

  const data = {
    id: id || uid(),
    repEmail, repName,
    account:    g("f-account"),
    country:    g("f-country"),
    industry:   g("f-industry"),
    vendor:     g("f-vendor"),
    type:       g("f-type"),
    stage:      g("f-stage"),
    priority:   g("f-priority"),
    outcome:    g("f-outcome"),
    value:      Number(g("f-value")||0),
    date:       g("f-date"),
    duration:   Number(g("f-duration")||60),
    attended:   Number(g("f-attended")||1),
    score:      Number(g("f-score")||3),
    notes:      g("f-notes"),
    nextAction: g("f-nextAction"),
    nextDate:   g("f-nextDate"),
    updatedAt:  today(),
    createdAt:  id ? (appData.meetings.find(m=>m.id===id)||{}).createdAt||today() : today(),
  };

  if(id){
    appData.meetings = appData.meetings.map(m=>m.id===id?data:m);
  } else {
    appData.meetings.unshift(data);
  }

  closeModal();
  await saveData();
  toast(id?"Meeting updated":"Meeting logged successfully");
  renderView("meetings");
  buildSidebar();
}

// CHART HELPERS
// ═══════════════════════════════════════════════════════════════
const CHART_COLORS = ["#C8A84B","#4B9CF5","#8B5CF6","#3DD68C","#F59E0B","#14B8A6","#EC4899","#F43F5E"];

function donutHtml(data, title, cx=70, r=48){
  if(!data.length) return `<div class="sec-title">${title}</div><div style="color:var(--dim);font-size:13px">No data</div>`;
  const total = data.reduce((a,b)=>a+b.v,0)||1;
  let angle = -Math.PI/2;
  const slices = data.map((d,i)=>{
    const pct=d.v/total, a1=angle, a2=angle+pct*2*Math.PI;
    angle=a2;
    const x1=cx+r*Math.cos(a1),y1=cx+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cx+r*Math.sin(a2);
    return `<path d="M${cx},${cx} L${x1},${y1} A${r},${r} 0 ${pct>.5?1:0},1 ${x2},${y2} Z" fill="${CHART_COLORS[i%CHART_COLORS.length]}" opacity=".85"/>`;
  });
  return `
    <div class="sec-title">${title}</div>
    <div class="donut-wrap">
      <div style="position:relative;flex-shrink:0">
        <svg width="${cx*2}" height="${cx*2}" viewBox="0 0 ${cx*2} ${cx*2}">
          <circle cx="${cx}" cy="${cx}" r="${r}" fill="rgba(255,255,255,.04)"/>
          ${slices.join("")}
          <circle cx="${cx}" cy="${cx}" r="${r*.58}" fill="var(--card)"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:20px;font-weight:700;font-family:'Playfair Display',serif">${total}</div>
          <div style="font-size:10px;color:var(--dim)">Total</div>
        </div>
      </div>
      <div class="donut-legend">
        ${data.map((d,i)=>`<div class="donut-legend-item"><div class="donut-dot" style="background:${CHART_COLORS[i%CHART_COLORS.length]}"></div><span style="font-size:11px;color:var(--muted);flex:1">${d.k}</span><span style="font-size:11px;color:var(--text);font-weight:600;font-family:'DM Mono',monospace">${d.v}</span></div>`).join("")}
      </div>
    </div>
  `;
}

function barChartHtml(data, title, color="#C8A84B", valFmt=v=>v){
  if(!data.length) return `<div class="sec-title">${title}</div><div style="color:var(--dim);font-size:13px">No data</div>`;
  const max=Math.max(...data.map(d=>d.v),1);
  return `
    <div class="sec-title">${title}</div>
    ${data.map(d=>`
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;color:var(--muted)">${d.k}</span>
          <span style="font-size:12px;color:${color};font-weight:600;font-family:'DM Mono',monospace">${valFmt(d.v)}</span>
        </div>
        <div class="mini-bar-wrap"><div class="mini-bar" style="width:${(d.v/max)*100}%;background:${color}"></div></div>
      </div>
    `).join("")}
  `;
}

function weekBarsHtml(meetings){
  const weeks = Array.from({length:12},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(11-i)*7);
    const s=d.toISOString().split("T")[0];
    const nd=new Date(d); nd.setDate(nd.getDate()+7);
    const e=nd.toISOString().split("T")[0];
    return {label:`W${i+1}`, count:meetings.filter(m=>m.date>=s&&m.date<e).length};
  });
  const max=Math.max(...weeks.map(w=>w.count),1);
  return `
    <div class="sec-title">12-Week Cadence</div>
    <div style="display:flex;align-items:flex-end;gap:3px;height:60px">
      ${weeks.map(w=>`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px" title="${w.count} meetings">
          <div style="width:100%;height:${(w.count/max)*52}px;background:linear-gradient(180deg,var(--gold),#9a7520);border-radius:3px 3px 0 0;min-height:${w.count?3:0}px;transition:height .5s"></div>
          <div style="font-size:8px;color:var(--dim);font-family:'DM Mono',monospace">${w.label}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function funnelHtml(meetings){
  const stages=STAGES_LIST.slice(0,5);
  const counts={};
  meetings.forEach(m=>{counts[m.stage]=(counts[m.stage]||0)+1;});
  const max=Math.max(...stages.map(s=>counts[s]||0),1);
  return `
    <div class="sec-title">Pipeline Funnel</div>
    ${stages.map(s=>`
      <div style="margin-bottom:8px;display:flex;align-items:center;gap:10px">
        <div style="width:86px;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0">${s}</div>
        <div style="flex:1;display:flex;align-items:center;gap:8px">
          <div style="width:${((counts[s]||0)/max)*100}%;height:20px;background:${STAGE_COLORS[s]};border-radius:4px;min-width:${counts[s]?4:0}px;transition:width .5s;opacity:.85"></div>
          <span style="font-size:12px;color:var(--text);font-weight:600;font-family:'DM Mono',monospace">${counts[s]||0}</span>
        </div>
      </div>
    `).join("")}
    <div style="display:flex;gap:8px;margin-top:12px">
      <div style="flex:1;background:rgba(61,214,140,.1);border:1px solid rgba(61,214,140,.25);border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:700;font-family:'Playfair Display',serif;color:var(--green)">${counts["Closed Won"]||0}</div>
        <div style="font-size:10px;color:var(--dim)">Won</div>
      </div>
      <div style="flex:1;background:rgba(240,82,82,.1);border:1px solid rgba(240,82,82,.25);border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:700;font-family:'Playfair Display',serif;color:var(--red)">${counts["Closed Lost"]||0}</div>
        <div style="font-size:10px;color:var(--dim)">Lost</div>
      </div>
    </div>
  `;
}

function leaderboardHtml(meetings){
  const byRep={};
  meetings.forEach(m=>{
    if(!byRep[m.repEmail]) byRep[m.repEmail]={email:m.repEmail,name:m.repName||m.repEmail,meetings:0,pipeline:0,scoreSum:0};
    byRep[m.repEmail].meetings++;
    byRep[m.repEmail].pipeline+=Number(m.value||0);
    byRep[m.repEmail].scoreSum+=Number(m.score||0);
  });
  const rows=Object.values(byRep).sort((a,b)=>b.meetings-a.meetings);
  const maxM=Math.max(...rows.map(r=>r.meetings),1);
  const medals=["🥇","🥈","🥉"];
  return `
    <div class="sec-title">Rep Leaderboard</div>
    ${rows.map((r,i)=>`
      <div style="margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
          <span style="font-size:15px;flex-shrink:0">${medals[i]||`#${i+1}`}</span>
          <span style="font-size:13px;color:var(--text);font-weight:600;flex:1">${(r.name||"").split(" ")[0]}</span>
          <span style="font-size:12px;color:var(--dim)">${r.meetings} mtgs</span>
          <span style="font-size:12px;color:var(--green);font-weight:600;font-family:'DM Mono',monospace">${fmt$(r.pipeline)}</span>
          <span style="font-size:11px;color:var(--gold)">★${r.meetings?(r.scoreSum/r.meetings).toFixed(1):"—"}</span>
        </div>
        <div class="mini-bar-wrap"><div class="mini-bar" style="width:${(r.meetings/maxM)*100}%;background:var(--gold)"></div></div>
      </div>
    `).join("")||`<div style="color:var(--dim);font-size:13px">No data yet</div>`}
  `;
}

          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:13px;color:var(--text);font-weight:600">${m.account}</span>
            <span style="font-size:11px;color:var(--red);font-family:'DM Mono',monospace">${fmtDate(m.nextDate)}</span>
          </div>
          <div style="font-size:12px;color:var(--dim)">${(m.repName||"").split(" ")[0]} · ${m.nextAction}</div>
        </div>`).join("")
    }
  `;
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════
function statCard(label,value,sub,accent,icon){
  return `<div class="stat-card">
    <div class="stat-glow" style="background:${accent}12"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div class="stat-label">${label}</div>
      <div style="color:${accent};width:18px;height:18px;opacity:.8">${icon}</div>
    </div>
    <div class="stat-value">${value}</div>
    <div class="stat-sub">${sub}</div>
  </div>`;
}

function stageBadge(stage){
  const c=STAGE_COLORS[stage]||"rgba(255,255,255,.2)";
  return `<span class="badge" style="background:${c}20;color:${c};border:1px solid ${c}35">${stage}</span>`;
}

function roleBadge(role){
  const c=ROLE_COLORS[role]||"var(--muted)";
  const l=role?role.charAt(0).toUpperCase()+role.slice(1):role;
  return `<span class="badge" style="background:${c}18;color:${c};border:1px solid ${c}30;font-size:10px;padding:2px 7px">${l}</span>`;
}

function starsHtml(n){
  n=Number(n)||0;
  return `<div class="stars">${[1,2,3,4,5].map(i=>`<svg class="star" viewBox="0 0 24 24" fill="${i<=n?"currentColor":"none"}" stroke="currentColor" stroke-width="1.8" style="opacity:${i<=n?1:.2}"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`).join("")}</div>`;
}

// ═══════════════════════════════════════════════════════════════
// BOOT — handle redirect
// ═══════════════════════════════════════════════════════════════
(async ()=>{
  await msalInstance.initialize();
  try {
    const r = await msalInstance.handleRedirectPromise();
    if(r && r.account){
      await initUser(r.account);
      return;
    }
  } catch(e){ console.error(e); }

  // Check existing session
  const accounts = msalInstance.getAllAccounts();
  if(accounts.length > 0){
    try {
      await initUser(accounts[0]);
    } catch(e){
      console.error("Session restore failed:", e);
    }
  }
})();
</script>
